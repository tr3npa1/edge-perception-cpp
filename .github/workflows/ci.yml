name: CPU portability

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ORT CPU
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip -r requirements-test.txt

      - name: Install Linux C++ dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            curl \
            libopencv-dev \
            ninja-build

          ORT_ARCHIVE="$RUNNER_TEMP/onnxruntime.tgz"
          ORT_PARENT="$RUNNER_TEMP/onnxruntime"
          curl --fail --location \
            "https://github.com/microsoft/onnxruntime/releases/download/v1.27.0/onnxruntime-linux-x64-1.27.0.tgz" \
            --output "$ORT_ARCHIVE"
          mkdir -p "$ORT_PARENT"
          tar -xzf "$ORT_ARCHIVE" -C "$ORT_PARENT"

          ORT_ROOT="$(find "$ORT_PARENT" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -f "$ORT_ROOT/include/onnxruntime_cxx_api.h"

          echo "EDGE_ONNXRUNTIME_ROOT=$ORT_ROOT" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$ORT_ROOT/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Install Windows C++ dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          choco install ninja --yes --no-progress

          $OrtZip = Join-Path $env:RUNNER_TEMP "onnxruntime.zip"
          $OrtParent = Join-Path $env:RUNNER_TEMP "onnxruntime"
          Invoke-WebRequest `
            -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.27.0/onnxruntime-win-x64-1.27.0.zip" `
            -OutFile $OrtZip
          Expand-Archive -LiteralPath $OrtZip -DestinationPath $OrtParent -Force

          $OrtHeader = Get-ChildItem `
            -LiteralPath $OrtParent `
            -Recurse `
            -File `
            -Filter "onnxruntime_cxx_api.h" |
            Select-Object -First 1

          if ($null -eq $OrtHeader) {
              throw "ONNX Runtime C++ headers were not found."
          }

          $OrtRoot = $OrtHeader.Directory.Parent.FullName
          "EDGE_ONNXRUNTIME_ROOT=$OrtRoot" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          $OrtRuntime = Get-ChildItem `
            -LiteralPath $OrtRoot `
            -Recurse `
            -File `
            -Filter "onnxruntime.dll" |
            Select-Object -First 1

          if ($null -ne $OrtRuntime) {
              $OrtRuntime.Directory.FullName | Out-File `
                -FilePath $env:GITHUB_PATH `
                -Encoding utf8 `
                -Append
          }

          $OpenCvArchive = Join-Path $env:RUNNER_TEMP "opencv.exe"
          $OpenCvParent = Join-Path $env:RUNNER_TEMP "opencv"
          Invoke-WebRequest `
            -Uri "https://github.com/opencv/opencv/releases/download/4.11.0/opencv-4.11.0-windows.exe" `
            -OutFile $OpenCvArchive

          New-Item -ItemType Directory -Force -Path $OpenCvParent | Out-Null
          & 7z x $OpenCvArchive "-o$OpenCvParent" -y | Out-Null

          $OpenCvConfig = Get-ChildItem `
            -LiteralPath $OpenCvParent `
            -Recurse `
            -File `
            -Filter "OpenCVConfig.cmake" |
            Where-Object {
                $_.Directory.FullName -match "\\x64\\vc[0-9]+\\lib$"
            } |
            Select-Object -First 1

          if ($null -eq $OpenCvConfig) {
              throw "OpenCVConfig.cmake was not found."
          }

          "EDGE_OPENCV_DIR=$($OpenCvConfig.Directory.FullName)" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          $OpenCvBin = Join-Path $OpenCvConfig.Directory.Parent.FullName "bin"
          $OpenCvBin | Out-File `
            -FilePath $env:GITHUB_PATH `
            -Encoding utf8 `
            -Append

      - name: Activate MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure portable CPU build
        run: cmake --preset cpu-release

      - name: Build portable CPU release
        run: cmake --build --preset cpu-release

      - name: Run CTest suite
        run: ctest --preset cpu-release

      - name: Run Python parity tests directly
        run: python -m pytest -q tests/test_parity.py -m "not integration"

      - name: Check patch whitespace
        run: git diff --check
